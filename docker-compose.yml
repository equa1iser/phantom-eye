# ── Shared network ────────────────────────────────────────────────────────────
networks:
  signoz-net:
    driver: bridge

# ── Named volumes (persist across container restarts) ─────────────────────────
volumes:
  zookeeper-data:
  clickhouse-data:
  signoz-db:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── ZooKeeper (ClickHouse coordination) ─────────────────────────────────────
  zookeeper-1:
    image: signoz/zookeeper:3.7.1
    hostname: zookeeper-1
    environment:
      ZOO_SERVER_ID: "1"
      ALLOW_ANONYMOUS_LOGIN: "yes"
      ZOO_AUTOPURGE_INTERVAL: "1"
    volumes:
      - zookeeper-data:/bitnami/zookeeper
    networks:
      - signoz-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/zookeeper/bin/zkServer.sh status 2>/dev/null | grep -q 'Mode:'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── ClickHouse (trace/metric/log storage) ────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    hostname: clickhouse
    depends_on:
      zookeeper-1:
        condition: service_healthy
    volumes:
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/overrides.xml
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml
      - ./docker/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./docker/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - signoz-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── SigNoz Schema Migrator (runs once, sets up all ClickHouse tables) ────────
  signoz-schema-migrator:
    image: signoz/signoz-otel-collector:v0.144.4
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - >
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: "true"
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
      LOW_CARDINAL_EXCEPTION_GROUPING: "false"
    networks:
      - signoz-net
    restart: on-failure

  # ── SigNoz OTEL Collector ────────────────────────────────────────────────────
  otel-collector:
    image: signoz/signoz-otel-collector:v0.144.4
    command: ["--config=/etc/otel-collector-config.yaml"]
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz-schema-migrator:
        condition: service_completed_successfully
    environment:
      OTEL_RESOURCE_ATTRIBUTES: "host.name=phantom-server,os.type=linux"
      LOW_CARDINAL_EXCEPTION_GROUPING: "false"
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: "true"
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # gRPC OTLP — used by phantom-eye
      - "4318:4318"   # HTTP OTLP — optional
    networks:
      - signoz-net
    restart: unless-stopped

  # ── SigNoz (combined UI + query service + alertmanager) ──────────────────────
  signoz:
    image: signoz/signoz:v0.124.0
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz-schema-migrator:
        condition: service_completed_successfully
    environment:
      SIGNOZ_ALERTMANAGER_PROVIDER: signoz
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
      SIGNOZ_TOKENIZER_JWT_SECRET: phantom-eye-signoz-2024
    volumes:
      - signoz-db:/var/lib/signoz
    ports:
      - "3301:8080"   # SigNoz UI → http://localhost:3301
    networks:
      - signoz-net
    restart: unless-stopped

  # ── Phantom Eye ───────────────────────────────────────────────────────────────
  phantom-eye:
    build:
      context: .
      args:
        YOLO: "false"   # set to "true" to include ultralytics (~500 MB extra)
    depends_on:
      - otel-collector
    ports:
      - "5000:5000"   # Dashboard → http://localhost:5000
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: phantom-eye
    volumes:
      - ./server/data:/app/data         # cameras.json, alerts, snapshots, recordings
      - ./server/plugins:/app/plugins   # plugin hot-swap without rebuild
    networks:
      - signoz-net
    restart: unless-stopped
